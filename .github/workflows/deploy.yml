name: Deploy to prod

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - 'LICENSE'
  workflow_dispatch: {}

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Sanity-check secrets
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          if [ -z "$DEPLOY_HOST" ]; then echo "::error::DEPLOY_HOST secret is empty"; exit 1; fi
          if [ -z "$DEPLOY_SSH_KEY" ]; then echo "::error::DEPLOY_SSH_KEY secret is empty"; exit 1; fi
          echo "host length: ${#DEPLOY_HOST}"
          echo "key length:  ${#DEPLOY_SSH_KEY}"
          echo "key first line: $(echo "$DEPLOY_SSH_KEY" | head -1 | head -c 40)…"
          echo "key last line:  $(echo "$DEPLOY_SSH_KEY" | tail -1 | head -c 40)…"

      - name: Configure SSH key
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          # Strip CRLFs and ensure trailing newline — handles Windows / browser
          # clipboard mangling silently.
          printf '%s\n' "$DEPLOY_SSH_KEY" | tr -d '\r' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          echo "── deploy_key file diagnostic ──"
          echo "  bytes:        $(wc -c < ~/.ssh/deploy_key)"
          echo "  lines:        $(wc -l < ~/.ssh/deploy_key)"
          echo "  first line:   $(head -1 ~/.ssh/deploy_key | head -c 60)"
          echo "  last line:    $(tail -1 ~/.ssh/deploy_key | head -c 60)"
          # Validate it parses as a real SSH key.
          if ! ssh-keygen -y -f ~/.ssh/deploy_key > /dev/null 2>&1; then
            echo "::error::deploy_key is not a valid SSH private key."
            echo "::error::Most likely: you pasted miaoradio_deploy.pub instead of miaoradio_deploy,"
            echo "::error::or the key got mangled. On your laptop run:"
            echo "::error::    cat ~/.ssh/miaoradio_deploy | pbcopy"
            echo "::error::then paste into the DEPLOY_SSH_KEY secret."
            exit 1
          fi
          echo "deploy_key parses OK"

      - name: Deploy
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          ssh \
            -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=accept-new \
            -o UserKnownHostsFile=~/.ssh/known_hosts \
            -o ConnectTimeout=10 \
            -o LogLevel=ERROR \
            ubuntu@"$DEPLOY_HOST" \
            'bash ~/miaoRadio/deploy/update.sh'

      - name: Verify service is running
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          ssh \
            -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=accept-new \
            -o UserKnownHostsFile=~/.ssh/known_hosts \
            -o ConnectTimeout=10 \
            -o LogLevel=ERROR \
            ubuntu@"$DEPLOY_HOST" \
            'systemctl is-active miaoradio'
