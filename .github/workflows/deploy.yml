name: Deploy to prod

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - 'LICENSE'
  workflow_dispatch: {}

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy
        run: |
          ssh -i ~/.ssh/deploy_key ubuntu@"${{ secrets.DEPLOY_HOST }}" \
            'bash ~/miaoRadio/deploy/update.sh'

      - name: Verify service is running
        run: |
          ssh -i ~/.ssh/deploy_key ubuntu@"${{ secrets.DEPLOY_HOST }}" \
            'systemctl is-active miaoradio && sudo systemctl status miaoradio --no-pager | head -5'
